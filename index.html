<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnFollowers IG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { image-rendering: pixelated; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .handle {
      position: fixed;
      top: 1.5rem;
      right: 1.75rem;
      font-size: 0.55rem;
      color: #444;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    h1 {
      font-size: 0.75rem;
      color: #666;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 1rem 2rem;
      font-size: 0.65rem;
      font-family: 'Press Start 2P', monospace;
      border-radius: 0;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      line-height: 1.6;
    }

    button:hover {
      background: #ccc;
    }

    button.copied {
      background: #000;
      color: #fff;
      border: 1px solid #333;
    }

    .hint {
      font-size: 0.4rem;
      color: #333;
      text-align: center;
      line-height: 2;
      max-width: 320px;
    }
  </style>
</head>
<body>

  <span class="handle">santtisosa</span>

  <div class="center">
    <h1>unfollowers ig</h1>
    <button id="btn" onclick="copy()">Copiar script</button>
    <span class="hint">pegalo en la consola del navegador con instagram abierto</span>
  </div>

  <script>
    let code = '';
    fetch('script.js').then(r => r.text()).then(t => code = t);

    function copy() {
      if (!code) return;
      navigator.clipboard.writeText(code).then(() => {
        const b = document.getElementById('btn');
        b.textContent = 'Copiado';
        b.classList.add('copied');
        setTimeout(() => { b.textContent = 'Copiar script'; b.classList.remove('copied'); }, 2000);
      });
    }
  </script>

</body>
</html>
