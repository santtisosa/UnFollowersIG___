<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnFollowers IG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .handle {
      position: fixed;
      top: 1.5rem;
      right: 1.75rem;
      font-size: 0.9rem;
      color: #555;
      letter-spacing: 0.02em;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.04em;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.01em;
    }

    button:hover {
      background: #e0e0e0;
    }

    button.copied {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }

    .hint {
      font-size: 0.78rem;
      color: #444;
    }
  </style>
</head>
<body>

  <span class="handle">santtisosa</span>

  <div class="center">
    <h1>unfollowers ig</h1>
    <button id="btn" onclick="copy()">Copiar script</button>
    <span class="hint">pegalo en la consola del navegador con instagram abierto</span>
  </div>

  <script>
    let code = '';
    fetch('script.js').then(r => r.text()).then(t => code = t);

    function copy() {
      if (!code) return;
      navigator.clipboard.writeText(code).then(() => {
        const b = document.getElementById('btn');
        b.textContent = 'Copiado';
        b.classList.add('copied');
        setTimeout(() => { b.textContent = 'Copiar script'; b.classList.remove('copied'); }, 2000);
      });
    }
  </script>

</body>
</html>
