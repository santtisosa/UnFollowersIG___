<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>unfollowers ig</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .handle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 0.65rem;
      color: #333;
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 28px;
      font-size: 0.7rem;
      font-family: monospace;
      cursor: pointer;
      letter-spacing: 2px;
    }

    button:hover { background: #ccc; }

    button.copied {
      background: #000;
      color: #333;
      border: 1px solid #1e1e1e;
    }

    .hint {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.6rem;
      color: #2a2a2a;
    }
  </style>
</head>
<body>

  <span class="handle">santtisosa</span>

  <button id="btn" onclick="copy()">copiar script</button>

  <span class="hint">pegar en consola del navegador con instagram abierto</span>

  <script>
    let code = '';
    fetch('script.js').then(r => r.text()).then(t => code = t);

    function copy() {
      if (!code) return;
      navigator.clipboard.writeText(code).then(() => {
        const b = document.getElementById('btn');
        b.textContent = 'copiado';
        b.classList.add('copied');
        setTimeout(() => { b.textContent = 'copiar script'; b.classList.remove('copied'); }, 2000);
      });
    }
  </script>

</body>
</html>
